<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SpaghettiAI · Phone camera</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      body { margin: 0; }
      .phone-wrap { max-width: 560px; margin: 0 auto; padding: 12px; }
      .viewport { position: relative; background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 3 / 4; }
      .viewport video { width: 100%; height: 100%; object-fit: contain; display: block; }
      .badge { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 999px; font-size: 13px;
               background: rgba(0,0,0,0.55); color: #fff; display: flex; align-items: center; gap: 6px; }
      .badge .dot { width: 9px; height: 9px; border-radius: 50%; background: #888; }
      .badge .dot.ok { background: #2ecc71; } .badge .dot.bad { background: #e74c3c; }
      .controls { display: grid; gap: 12px; margin-top: 14px; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .row label { font-size: 14px; }
      button.big { width: 100%; padding: 14px; font-size: 16px; border-radius: 10px; }
      .muted { color: #888; font-size: 13px; }
      input[type="range"] { width: 55%; }
      input[type="text"] { width: 55%; }
      .stat { font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <div class="phone-wrap">
      <h2 style="margin:8px 0 12px">📱 Phone camera</h2>

      <div class="viewport">
        <video id="video" autoplay playsinline muted></video>
        <div class="badge"><span id="dot" class="dot"></span><span id="state">starting…</span></div>
      </div>

      <div class="controls">
        <button id="toggleBtn" class="big primary">Start streaming</button>

        <div class="row">
          <label for="label">Name</label>
          <input type="text" id="label" placeholder="e.g. Kobra phone" />
        </div>
        <div class="row">
          <label for="fps">Frame rate <span id="fpsVal" class="stat"></span></label>
          <input type="range" id="fps" min="1" max="15" step="1" value="5" />
        </div>
        <div class="row">
          <label for="quality">Quality <span id="qVal" class="stat"></span></label>
          <input type="range" id="quality" min="30" max="95" step="5" value="70" />
        </div>
        <div class="row">
          <label for="width">Max width <span id="wVal" class="stat"></span></label>
          <input type="range" id="width" min="480" max="1920" step="160" value="1280" />
        </div>
        <div class="row">
          <label for="torch">🔦 Torch</label>
          <input type="checkbox" id="torch" />
        </div>
        <div class="row">
          <label for="facing">Rear camera</label>
          <input type="checkbox" id="facing" checked />
        </div>

        <p class="muted" id="info">Connecting…</p>
        <p class="muted stat" id="counters"></p>
      </div>
    </div>

    <canvas id="canvas" hidden></canvas>
    <script src="/phone.js"></script>
  </body>
</html>
