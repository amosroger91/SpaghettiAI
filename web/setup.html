<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SpaghettiAI · setup</title>
    <style>
      body { margin: 0; height: 100vh; display: grid; place-items: center; background: #0f1115; color: #e6e8ec;
        font: 15px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .box { text-align: center; max-width: 460px; padding: 24px; }
      h1 { font-size: 22px; margin: 0 0 6px; }
      .spin { width: 46px; height: 46px; margin: 18px auto; border: 4px solid #2a2f3a; border-top-color: #4f8cff;
        border-radius: 50%; animation: r 1s linear infinite; }
      @keyframes r { to { transform: rotate(360deg); } }
      .muted { color: #9aa3b2; }
      #state { margin-top: 10px; font-weight: 600; }
      .tip { margin-top: 18px; font-size: 13px; color: #9aa3b2; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>🍝 SpaghettiAI</h1>
      <div class="muted">First-time setup</div>
      <div class="spin"></div>
      <div id="state">Starting…</div>
      <p class="tip">Checking Ollama and the vision model. The first run downloads the model
        (a few GB), so this can take a while on a new machine. You can leave this open.</p>
    </div>
    <script>
      const state = document.getElementById("state");
      let tries = 0;
      async function poll() {
        tries++;
        try {
          const s = await (await fetch("/api/status")).json();
          if (s.ai && s.ai.ok) {
            state.textContent = "Ready! Opening dashboard…";
            location.href = "/monitor";
            return;
          }
          state.textContent = s.ai && s.ai.detail ? s.ai.detail : "Preparing the vision model…";
        } catch {
          state.textContent = "Starting the local server…";
        }
        setTimeout(poll, 3000);
      }
      poll();
    </script>
  </body>
</html>
