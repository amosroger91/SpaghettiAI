name: build

# Recompile the Windows installer on every push to main (uploaded as a run
# artifact for testing), and on a version tag (v*) build + publish it to the
# matching GitHub Release — which is what the in-app self-updater reads.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # required for electron-builder to upload release assets on tags

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon
        run: npm run icon

      - name: Compile TypeScript
        run: npm run build

      # On a tag → publish to the GitHub Release (creates/updates it + latest.yml).
      # On a branch push → just build; the artifact is uploaded below for testing.
      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --no-install electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}

      # electron-builder creates the release as a draft; publishing it makes the
      # assets (latest.yml + .exe + .blockmap) visible to electron-updater clients.
      - name: Publish release (un-draft)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest

      - name: Upload installer artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: SpaghettiAI-Setup-windows
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
